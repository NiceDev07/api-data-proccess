# /etc/nginx/sites-available/api-data-process
# Symlink to enable: ln -s /etc/nginx/sites-available/api-data-process \
#                              /etc/nginx/sites-enabled/api-data-process

upstream api_data_process {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name api-data-process.saem.tel;   # ← replace with your actual domain

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api-data-process.saem.tel;   # ← replace with your actual domain

    # ── TLS (managed by Certbot or your cert provider) ─────────────────────
    ssl_certificate     /etc/letsencrypt/live/api-data-process.saem.tel/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-data-process.saem.tel/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── File upload limits ─────────────────────────────────────────────────
    # CSV/XLSX files with up to 700 k rows can exceed 200 MB.
    client_max_body_size 500m;

    # ── Proxy timeouts (must be >= gunicorn timeout) ───────────────────────
    proxy_read_timeout    310s;
    proxy_send_timeout    310s;
    proxy_connect_timeout 10s;

    # ── Proxy headers ──────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Reuse upstream keep-alive connections
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # ── Compression ────────────────────────────────────────────────────────
    gzip              on;
    gzip_types        application/json text/plain;
    gzip_min_length   1024;
    gzip_proxied      any;

    # ── Routes ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://api_data_process;
    }
}
